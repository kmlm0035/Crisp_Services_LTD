<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crisp Services</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #080808;
      --surface: #111111;
      --accent: #c8f65d;
      --accent2: #7B5CF6;
      --text: #f0f0f0;
      --muted: #666;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }
    /* NAV */
    nav {
      position: fixed; top: 0; width: 100%; z-index: 100;
      padding: 1.5rem 5%;
      display: flex; justify-content: space-between; align-items: center;
      backdrop-filter: blur(12px);
      background: rgba(8,8,8,0.7);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .logo { font-weight: 900; font-size: 1.4rem; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .nav-cta {
      background: var(--accent); color: #000;
      padding: 0.55rem 1.4rem; border-radius: 100px;
      font-weight: 700; font-size: 0.85rem;
      text-decoration: none; transition: opacity 0.2s;
    }
    .nav-cta:hover { opacity: 0.85; }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column;
      justify-content: center; align-items: flex-start;
      padding: 0 5%; padding-top: 6rem;
      position: relative; overflow: hidden;
    }
    .hero-tag {
      background: rgba(200,246,93,0.1);
      color: var(--accent);
      border: 1px solid rgba(200,246,93,0.3);
      padding: 0.35rem 1rem; border-radius: 100px;
      font-size: 0.8rem; font-weight: 600;
      letter-spacing: 0.05em; margin-bottom: 1.5rem;
      opacity: 0;
    }
    .hero h1 {
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 900; line-height: 1.0;
      letter-spacing: -2px;
      max-width: 900px;
      opacity: 0;
    }
    .hero h1 em { color: var(--accent); font-style: normal; }
    .hero p {
      margin-top: 1.5rem;
      font-size: clamp(1rem, 2vw, 1.25rem);
      color: var(--muted); max-width: 520px; line-height: 1.7;
      opacity: 0;
    }
    .hero-btns {
      margin-top: 2.5rem; display: flex; gap: 1rem; flex-wrap: wrap;
      opacity: 0;
    }
    .btn-primary {
      background: var(--accent); color: #000;
      padding: 0.85rem 2rem; border-radius: 100px;
      font-weight: 700; font-size: 0.95rem;
      text-decoration: none; transition: transform 0.2s, opacity 0.2s;
    }
    .btn-primary:hover { transform: translateY(-2px); opacity: 0.9; }
    .btn-ghost {
      border: 1px solid rgba(255,255,255,0.2); color: var(--text);
      padding: 0.85rem 2rem; border-radius: 100px;
      font-weight: 600; font-size: 0.95rem;
      text-decoration: none; transition: border-color 0.2s;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .hero-glow {
      position: absolute; width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(200,246,93,0.08) 0%, transparent 70%);
      top: 10%; right: -10%; pointer-events: none;
    }
    .hero-glow2 {
      position: absolute; width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(123,92,246,0.1) 0%, transparent 70%);
      bottom: 10%; left: -5%; pointer-events: none;
    }

    /* MARQUEE */
    .marquee-wrap {
      overflow: hidden; border-top: 1px solid rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding: 1.2rem 0; background: var(--surface);
    }
    .marquee-track {
      display: flex; gap: 3rem; width: max-content;
      animation: marquee 20s linear infinite;
    }
    .marquee-track span {
      font-size: 0.8rem; font-weight: 600; letter-spacing: 0.1em;
      color: var(--muted); text-transform: uppercase; white-space: nowrap;
    }
    .marquee-track span.dot { color: var(--accent); font-size: 1.2rem; line-height: 1; }
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    /* SERVICES */
    .section { padding: 7rem 5%; }
    .section-label {
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 1rem;
    }
    .section-title {
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 900; letter-spacing: -1px; line-height: 1.1;
      max-width: 600px;
    }
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem; margin-top: 4rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px; padding: 2rem;
      transition: border-color 0.3s, transform 0
